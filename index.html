<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MPL</title>
<style>
body{
background:#090d18;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:0;
}
.header{
padding:20px;
display:flex;
align-items:center;
gap:15px;
background:#111827;
}
.logo{
background:#6d5efc;
padding:15px;
border-radius:12px;
font-weight:bold;
}
.tabs{
display:flex;
overflow:auto;
padding:15px;
gap:10px;
}
.tab{
background:#111827;
padding:10px 15px;
border-radius:10px;
}
.live{
background:green;
padding:2px 6px;
border-radius:5px;
font-size:12px;
}
.table{
padding:15px;
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
padding:12px;
border-bottom:1px solid #222;
}
.w{background:#00c853;padding:4px;border-radius:4px;}
.l{background:#ff5252;padding:4px;border-radius:4px;}
.d{background:#666;padding:4px;border-radius:4px;}
</style>
</head>
<body>

<div class="header">
<div class="logo">MPL</div>
<div>Mobile Premier League</div>
</div>

<div class="tabs">
<div class="tab">KPM3 <span class="live">LIVE</span></div>
<div class="tab">Super League <span class="live">LIVE</span></div>
<div class="tab">Championship</div>
</div>

<div class="table">
<h2>KPM3 - Season 1</h2>

<table>
<tr>
<th>#</th>
<th>Club</th>
<th>PTS</th>
<th>Form</th>
</tr>

<tr>
<td>1</td>
<td>VOXHNL</td>
<td>25</td>
<td>
<span class="w">W</span>
<span class="w">W</span>
<span class="w">W</span>
<span class="w">W</span>
<span class="w">W</span>
</td>
</tr>

<tr>
<td>2</td>
<td>DENO</td>
<td>21</td>
<td>
<span class="d">D</span>
<span class="w">W</span>
<span class="w">W</span>
<span class="w">W</span>
<span class="d">D</span>
</td>
</tr>

<tr>
<td>3</td>
<td>PARTEL</td>
<td>13</td>
<td>
<span class="l">L</span>
<span class="w">W</span>
<span class="l">L</span>
<span class="w">W</span>
<span class="d">D</span>
</td>
</tr>

<tr>
<td>4</td>
<td>UNSTOPPABLE</td>
<td>12</td>
<td>
<span class="w">W</span>
<span class="l">L</span>
<span class="d">D</span>
<span class="l">L</span>
<span class="d">D</span>
</td>
</tr>

</table>

</div>

</body>
</html>
